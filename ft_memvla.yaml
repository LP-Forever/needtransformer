description: MemoryVLA training for custom_finetuning dataset on amlt cloud

env_defaults:
  NODES: 1
  GPUS: 8
  MEM: 40
  JOB_NAME: memvla-custom-train

target:
  service: sing
  workspace_name: wsgcrrbt
  name: palisades32

storage:
  my_output:
    storage_account_name: azsussc
    container_name: v-wangxiaofa
    mount_dir: /mnt/wangxiaofa

  data:
    storage_account_name: azsussc
    container_name: v-wenhuitan
    mount_dir: /mnt/robotdata
    is_output: false

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    # Install MemoryVLA
    - cd $$AMLT_CODE_DIR/MemoryVLA
    - pip install torch==2.2.0 torchvision==0.17.0 torchaudio==2.2.0 --index-url https://download.pytorch.org/whl/cu121
    - conda install -y -c nvidia cuda-nvcc=12.1 cuda-toolkit=12.1
    - pip install -e .
    - pip install flash-attn --no-build-isolation
    # Download pretrained checkpoint if not already on storage
    # - huggingface-cli download CogACT/CogACT-Large --local-dir $$AMLT_CODE_DIR/MemoryVLA/pretrained/CogACT-Large

code:
  local_dir: $CONFIG_DIR/

data:
  storage_id: my_output

jobs:
  - name: $JOB_NAME
    sku: ${NODES}x${MEM}G${GPUS}-A100
    process_count_per_node: 1
    sla_tier: Premium
    execution_mode: basic
    identity: managed
    submit_args:
      env:
        AMLT_DOCKERFILE_TEMPLATE: default
        _AZUREML_SINGULARITY_JOB_UAI: /subscriptions/3289a5dd-b901-4b63-9562-bbbdfffba9de/resourcegroups/ws/providers/Microsoft.ManagedIdentity/userAssignedIdentities/wsgcrrbt-identity
        SHARED_MEMORY_PERCENT: 0.5
        HF_HUB_OFFLINE: "0"

    command:
      - cd $$AMLT_CODE_DIR/MemoryVLA
      - bash run_memvla_train.sh